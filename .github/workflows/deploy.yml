name: Deploy Portfolio to Namecheap

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build portfolio
        run: pnpm --filter @workspace/portfolio run build
        env:
          NODE_ENV: production

      - name: Copy PHP backend into build output
        run: |
          cp php-site/.htaccess artifacts/portfolio/dist/public/.htaccess
          cp php-site/config.php artifacts/portfolio/dist/public/config.php
          cp php-site/setup.php artifacts/portfolio/dist/public/setup.php
          mkdir -p artifacts/portfolio/dist/public/api
          cp php-site/api/db.php artifacts/portfolio/dist/public/api/db.php
          cp php-site/api/index.php artifacts/portfolio/dist/public/api/index.php
          mkdir -p artifacts/portfolio/dist/public/uploads

      - name: FTP Deploy
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: artifacts/portfolio/dist/public/
          server-dir: /public_html/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
